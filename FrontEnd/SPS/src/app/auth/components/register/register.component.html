<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm" style="width: 100%; max-width: 460px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-p-circle-fill text-primary fs-1"></i>
        <h3 class="fw-bold mt-2">Create Account</h3>
        <p class="text-muted">Join Smart Parking System</p>
      </div>

      <div *ngIf="errorMsg" class="alert alert-danger py-2">{{ errorMsg }}</div>
      <div *ngIf="successMsg" class="alert alert-success py-2">
  {{ successMsg }}
</div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" class="form-control" formControlName="name" placeholder="John Doe"
            [class.is-invalid]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
          <div class="invalid-feedback">Name must be at least 3 characters.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input type="email" class="form-control" formControlName="email" placeholder="you@example.com"
            [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control" formControlName="password" placeholder="••••••••"
            [class.is-invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          <div class="invalid-feedback">Password must be at least 6 characters.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Confirm Password</label>
          <input type="password" class="form-control" formControlName="confirmPassword" placeholder="••••••••"
            [class.is-invalid]="(registerForm.get('confirmPassword')?.touched && registerForm.hasError('passwordMismatch'))">
          <div class="invalid-feedback">Passwords do not match.</div>
        </div>

        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-success btn-lg" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            {{ loading ? 'Registering...' : 'Register' }}
          </button>
        </div>
      </form>

      <p class="text-center mt-3 mb-0">
        Already have an account? <a routerLink="/auth/login" class="text-primary fw-semibold">Sign In</a>
      </p>
    </div>
  </div>
</div>
