<div class="container py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
      <i class="bi bi-car-front-fill text-primary me-2"></i>My Vehicles
    </h4>
    <a routerLink="/vehicles/add" class="btn btn-primary">
      <i class="bi bi-plus-lg me-1"></i>Add Vehicle
    </a>
  </div>

  <!-- Alerts -->
  <div *ngIf="errorMsg" class="alert alert-danger d-flex align-items-center justify-content-between py-2">
    <span><i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMsg }}</span>
    <button class="btn btn-sm btn-danger" (click)="forceLogout()">
      <i class="bi bi-box-arrow-right me-1"></i>Log out &amp; Re-login
    </button>
  </div>
  <div *ngIf="successMsg" class="alert alert-success d-flex align-items-center gap-2 py-2">
    <i class="bi bi-check-circle-fill"></i> {{ successMsg }}
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="text-muted mt-2">Loading vehicles...</p>
  </div>

  <ng-container *ngIf="!loading">

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-4">
      <li class="nav-item">
        <button class="nav-link d-flex align-items-center gap-2"
          [class.active]="activeTab === 'CAR'"
          (click)="setTab('CAR')">
          <i class="bi bi-car-front"></i> CAR
          <span class="badge rounded-pill"
            [class.bg-primary]="activeTab === 'CAR'"
            [class.bg-secondary]="activeTab !== 'CAR'">{{ carCount }}</span>
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link d-flex align-items-center gap-2"
          [class.active]="activeTab === 'BIKE'"
          (click)="setTab('BIKE')">
          <i class="bi bi-bicycle"></i> BIKE
          <span class="badge rounded-pill"
            [class.bg-primary]="activeTab === 'BIKE'"
            [class.bg-secondary]="activeTab !== 'BIKE'">{{ bikeCount }}</span>
        </button>
      </li>
    </ul>

    <!-- Empty State -->
    <div *ngIf="filteredVehicles.length === 0" class="text-center py-5 text-muted">
      <i class="bi fs-1" [class.bi-car-front]="activeTab === 'CAR'" [class.bi-bicycle]="activeTab === 'BIKE'"></i>
      <p class="mt-2">No {{ activeTab | titlecase }}s registered yet.</p>
      <a routerLink="/vehicles/add" class="btn btn-outline-primary btn-sm">
        <i class="bi bi-plus-lg me-1"></i>Add {{ activeTab | titlecase }}
      </a>
    </div>

    <!-- Vehicle Cards -->
    <div class="row g-3" *ngIf="filteredVehicles.length > 0">
      <div class="col-md-6 col-lg-4" *ngFor="let v of filteredVehicles">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body">
            <!-- Type Badge -->
            <div class="d-flex justify-content-between align-items-start mb-3">
              <span class="badge fs-6 px-3 py-1"
                [class.bg-primary]="v.vehicleType === 'CAR'"
                [class.bg-warning]="v.vehicleType === 'BIKE'"
                [class.text-dark]="v.vehicleType === 'BIKE'">
                <i class="me-1"
                  [class.bi-car-front]="v.vehicleType === 'CAR'"
                  [class.bi-bicycle]="v.vehicleType === 'BIKE'"></i>
                {{ v.vehicleType }}
              </span>
            </div>

            <!-- Vehicle Info -->
            <h5 class="card-title fw-bold mb-1">{{ v.model }}</h5>
            <p class="card-text">
              <i class="bi bi-card-text text-muted me-1"></i>
              <span class="fw-semibold text-uppercase">{{ v.vehicleNumber }}</span>
            </p>
          </div>

          <!-- Actions -->
          <div class="card-footer bg-transparent d-flex gap-2">
            <a [routerLink]="['/vehicles/edit', v.id]"
              class="btn btn-sm btn-outline-secondary flex-fill">
              <i class="bi bi-pencil me-1"></i>Edit
            </a>
            <button class="btn btn-sm btn-outline-danger flex-fill"
              (click)="delete(v.id!)">
              <i class="bi bi-trash me-1"></i>Delete
            </button>
          </div>
        </div>
      </div>
    </div>

  </ng-container>
</div>
