<div class="container py-4" style="max-width:540px">
  <h4 class="fw-bold mb-4"><i class="bi bi-building-add text-primary me-2"></i>Create Building</h4>

  <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>
  <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label fw-semibold">Building Name *</label>
      <input formControlName="name" class="form-control"
        [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched" />
      <div class="invalid-feedback">Building name is required.</div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">City *</label>
      <input formControlName="city" class="form-control"
        [class.is-invalid]="form.get('city')?.invalid && form.get('city')?.touched" />
      <div class="invalid-feedback">City is required.</div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Address</label>
      <input formControlName="address" class="form-control" placeholder="e.g. 123 Main Street" />
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="submitting">
        <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
        Create Building
      </button>
      <a routerLink="/admin" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
