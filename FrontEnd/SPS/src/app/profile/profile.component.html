<div class="container py-5" style="max-width: 540px;">
  <div class="card shadow-sm border-0">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0"><i class="bi bi-person-fill me-2"></i>My Profile</h5>
    </div>
    <div class="card-body p-4">

      <!-- Loading -->
      <div *ngIf="loading" class="text-center py-4">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Loading profile…</p>
      </div>

      <!-- Form -->
      <form *ngIf="!loading" (ngSubmit)="save()" #profileForm="ngForm">

        <div *ngIf="successMsg" class="alert alert-success py-2">
          <i class="bi bi-check-circle me-1"></i>{{ successMsg }}
        </div>
        <div *ngIf="errorMsg" class="alert alert-danger py-2">
          <i class="bi bi-exclamation-circle me-1"></i>{{ errorMsg }}
        </div>

        <!-- Name -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="form.name"
            name="name"
            required
            placeholder="Your name"
          />
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input
            type="email"
            class="form-control"
            [(ngModel)]="form.email"
            name="email"
            required
            placeholder="you@example.com"
          />
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="form-label fw-semibold">New Password <span class="text-muted fw-normal">(leave blank to keep current)</span></label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="form.password"
            name="password"
            placeholder="••••••••"
          />
        </div>

        <div class="d-grid">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="saving || profileForm.invalid"
          >
            <span *ngIf="saving" class="spinner-border spinner-border-sm me-2"></span>
            {{ saving ? 'Saving…' : 'Save Changes' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
